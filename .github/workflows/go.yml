name: Go SDK Release

on:
  push:
    tags:
      - 'v*' # Runs when a tag like v1.0.0 is pushed

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Verify formatting
        run: go fmt ./...

      - name: Run static analysis
        run: go vet ./...

      - name: Build
        run: go build $(go list ./... | grep -v /samples)

      - name: Run tests
        run: go test -v $(go list ./... | grep -v /samples)

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: FastPix Go SDK ${{ github.ref_name }}
          body: |
            ## 🏗️ FastPix Go SDK ${{ github.ref_name }}
            
            ### 🚀 What's New
            - Complete API coverage for Media, Live Streaming, Video Data, and Signing Keys
            - Added DRM, AI, and Analytics modules
            - Improved error handling and timeout logic
            - Comprehensive test coverage
            - Updated for Go 1.22+
            
            ### 📦 Installation
            ```bash
            go get github.com/FastPix/fastpix-go@${{ github.ref_name }}
            ```

            ### 📚 Documentation
            - [pkg.go.dev](https://pkg.go.dev/github.com/FastPix/fastpix-go)
            - [GitHub](https://github.com/FastPix/fastpix-go)
          draft: false
          prerelease: false

      - name: Trigger pkg.go.dev indexing
        run: |
          VERSION=${{ github.ref_name }}
          MODULE="github.com/FastPix/fastpix-go"
          echo "🔄 Requesting pkg.go.dev to fetch ${MODULE}@${VERSION}"
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" "https://proxy.golang.org/${MODULE}/@v/${VERSION}.info")
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Failed to trigger pkg.go.dev indexing"
            exit 1
          fi
